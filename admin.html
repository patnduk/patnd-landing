<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Patnd Shop</title>
<style>
  :root{--bg:#0a0a0f;--card:#13111e;--border:#1c1a2e;--text:#e4e4e7;--dim:#71717a;--yellow:#FBBF24;--purple:#A78BFA;--purple-deep:#7C3AED;--turquoise:#2DD4BF;--red:#ef4444;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px;}
  .container{max-width:900px;margin:0 auto;}
  h1{color:var(--yellow);font-size:1.5rem;margin-bottom:24px;font-family:'Arial Black',Impact,sans-serif;letter-spacing:-1px;}
  h1 span{color:var(--purple);font-size:0.9rem;font-family:-apple-system,sans-serif;letter-spacing:0;}

  #login{max-width:360px;margin:120px auto;text-align:center;}
  #login h2{color:var(--yellow);margin-bottom:16px;}
  #login input{width:100%;padding:12px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1rem;margin-bottom:12px;outline:none;}
  #login input:focus{border-color:var(--purple);}
  #login button{width:100%;padding:12px;border-radius:8px;background:var(--yellow);border:none;color:var(--bg);font-weight:700;font-size:1rem;cursor:pointer;}

  #admin{display:none;}
  .form-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
  .form-section h2{font-size:1.1rem;margin-bottom:16px;color:var(--purple);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .form-row.full{grid-template-columns:1fr;}
  label{font-size:0.85rem;color:var(--dim);margin-bottom:4px;display:block;}
  input,select,textarea{width:100%;padding:10px 14px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--purple);}
  textarea{resize:vertical;min-height:80px;}
  select{cursor:pointer;}

  .upload-area{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:12px;}
  .upload-area:hover{border-color:var(--purple);}
  .upload-area.has-file{border-color:var(--yellow);border-style:solid;}
  .upload-area input{display:none;}
  .upload-area p{color:var(--dim);font-size:0.9rem;}
  .upload-area .filename{color:var(--yellow);font-weight:600;margin-top:8px;}
  .preview-img{max-width:200px;max-height:200px;border-radius:8px;margin-top:12px;}

  .submit-btn{padding:12px 32px;border-radius:8px;background:var(--yellow);border:none;color:var(--bg);font-weight:700;font-size:1rem;cursor:pointer;width:100%;}
  .submit-btn:hover{opacity:0.85;}
  .submit-btn:disabled{opacity:0.4;cursor:wait;}

  .items-list{margin-top:24px;}
  .items-list h2{font-size:1.1rem;margin-bottom:16px;color:var(--purple);}
  .list-item{display:grid;grid-template-columns:60px 1fr auto auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--card);}
  .list-item img{width:52px;height:52px;border-radius:6px;object-fit:cover;}
  .list-item .info h4{font-size:0.9rem;margin-bottom:2px;}
  .list-item .info p{font-size:0.78rem;color:var(--dim);}
  .list-item .price{color:var(--yellow);font-weight:700;font-size:1rem;min-width:70px;text-align:right;}
  .list-item .actions{display:flex;gap:6px;}
  .sold-btn{padding:6px 12px;border-radius:6px;background:rgba(45,212,191,0.12);border:1px solid var(--turquoise);color:var(--turquoise);font-size:0.75rem;cursor:pointer;font-weight:600;}
  .del-btn{padding:6px 12px;border-radius:6px;background:rgba(239,68,68,0.12);border:1px solid var(--red);color:var(--red);font-size:0.75rem;cursor:pointer;font-weight:600;}
  .status-msg{padding:12px;border-radius:8px;margin-bottom:16px;font-size:0.9rem;display:none;}
  .status-msg.success{display:block;background:rgba(45,212,191,0.1);border:1px solid var(--turquoise);color:var(--turquoise);}
  .status-msg.error{display:block;background:rgba(239,68,68,0.1);border:1px solid var(--red);color:var(--red);}
  @media(max-width:600px){.form-row{grid-template-columns:1fr;}.list-item{grid-template-columns:50px 1fr auto;}.list-item .actions{flex-direction:column;}}
</style>
</head>
<body>

<div id="login">
  <h2>PATND Admin</h2>
  <input type="password" id="pw" placeholder="Enter admin password" autofocus>
  <button id="loginBtn">Login</button>
</div>

<div id="admin" class="container">
  <h1>PATND <span>Shop Admin</span></h1>

  <div class="status-msg" id="status"></div>

  <div class="form-section">
    <h2>Add New Item</h2>
    <div class="form-row">
      <div><label>Title *</label><input type="text" id="title" placeholder="e.g. Nike Air Force 1 White"></div>
      <div><label>Price (£) *</label><input type="number" id="price" step="0.01" placeholder="29.99"></div>
    </div>
    <div class="form-row">
      <div><label>Category *</label>
        <select id="category">
          <option value="clothes">Clothes</option>
          <option value="jewelry">Jewelry</option>
          <option value="bags">Bags</option>
        </select>
      </div>
      <div><label>Size</label><input type="text" id="size" placeholder="e.g. UK 10, M, One Size"></div>
    </div>
    <div class="form-row">
      <div><label>Condition</label>
        <select id="condition">
          <option value="Brand new">Brand new</option>
          <option value="Like new">Like new</option>
          <option value="Pre-owned">Pre-owned</option>
          <option value="Good">Good</option>
          <option value="Fair">Fair</option>
        </select>
      </div>
      <div><label>Brand</label><input type="text" id="brand" placeholder="e.g. Nike, Gucci"></div>
    </div>
    <div class="form-row full">
      <div><label>Description</label><textarea id="description" placeholder="Describe the item — condition details, measurements, any flaws..."></textarea></div>
    </div>
    <div class="form-row full">
      <div>
        <label>Photo *</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="photoInput" accept="image/*">
          <p>Click or drag a photo here</p>
          <div class="filename" id="fileName"></div>
        </div>
        <img class="preview-img" id="preview" style="display:none">
      </div>
    </div>
    <button class="submit-btn" id="addBtn">Add Item</button>
  </div>

  <div class="items-list">
    <h2>Your Items</h2>
    <div id="itemsList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// *** REPLACE THESE WITH YOUR SUPABASE CREDENTIALS ***
const SUPABASE_URL = "https://qgsajxzxggdzqytfkgwr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ihQidin7MM6H725tBzVa1g_L4mloekV";
const ADMIN_PASSWORD = "PAtnd2626!!";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let selectedFile = null;

// Login
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

function doLogin() {
  if (document.getElementById("pw").value === ADMIN_PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    loadItems();
  } else {
    alert("Wrong password");
  }
}

// File upload
var uploadArea = document.getElementById("uploadArea");
var photoInput = document.getElementById("photoInput");

uploadArea.addEventListener("click", () => photoInput.click());
uploadArea.addEventListener("dragover", e => { e.preventDefault(); uploadArea.style.borderColor = "var(--purple)"; });
uploadArea.addEventListener("dragleave", () => { uploadArea.style.borderColor = selectedFile ? "var(--yellow)" : "var(--border)"; });
uploadArea.addEventListener("drop", e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
photoInput.addEventListener("change", () => {
  if (photoInput.files[0]) handleFile(photoInput.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  document.getElementById("fileName").textContent = file.name;
  uploadArea.classList.add("has-file");
  var reader = new FileReader();
  reader.onload = e => {
    var prev = document.getElementById("preview");
    prev.src = e.target.result;
    prev.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// Add item
document.getElementById("addBtn").addEventListener("click", addItem);

async function addItem() {
  var title = document.getElementById("title").value.trim();
  var price = document.getElementById("price").value;
  var category = document.getElementById("category").value;
  var size = document.getElementById("size").value.trim();
  var condition = document.getElementById("condition").value;
  var brand = document.getElementById("brand").value.trim();
  var description = document.getElementById("description").value.trim();

  if (!title || !price || !selectedFile) {
    showStatus("Please fill in title, price, and add a photo.", "error");
    return;
  }

  var btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {
    // Upload image
    var ext = selectedFile.name.split(".").pop();
    var fileName = Date.now() + "_" + Math.random().toString(36).substring(7) + "." + ext;

    var { data: uploadData, error: uploadErr } = await sb.storage
      .from("item-photos")
      .upload(fileName, selectedFile, { cacheControl: "3600", upsert: false });

    if (uploadErr) throw uploadErr;

    var { data: urlData } = sb.storage.from("item-photos").getPublicUrl(fileName);
    var imageUrl = urlData.publicUrl;

    // Insert item
    var { error: insertErr } = await sb.from("items").insert({
      title: title,
      price: parseFloat(price),
      category: category,
      size: size || null,
      condition: condition,
      brand: brand || null,
      description: description || null,
      image_url: imageUrl,
      sold: false,
    });

    if (insertErr) throw insertErr;

    showStatus("Item added!", "success");
    clearForm();
    loadItems();
  } catch (e) {
    showStatus("Error: " + e.message, "error");
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = "Add Item";
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("price").value = "";
  document.getElementById("size").value = "";
  document.getElementById("brand").value = "";
  document.getElementById("description").value = "";
  document.getElementById("fileName").textContent = "";
  document.getElementById("preview").style.display = "none";
  uploadArea.classList.remove("has-file");
  selectedFile = null;
}

// Load items
async function loadItems() {
  var list = document.getElementById("itemsList");
  try {
    var { data, error } = await sb.from("items").select("*").order("created_at", { ascending: false });
    if (error) throw error;

    if (!data || data.length === 0) {
      list.innerHTML = '<p style="color:var(--dim);padding:24px;text-align:center">No items yet. Add your first item above.</p>';
      return;
    }

    list.innerHTML = data.map(item =>
      '<div class="list-item">' +
      '<img src="' + (item.image_url || "") + '" alt="">' +
      '<div class="info"><h4>' + esc(item.title) + '</h4>' +
      '<p>' + item.category + (item.size ? ' · ' + item.size : '') + (item.sold ? ' · <span style="color:var(--turquoise)">SOLD</span>' : '') + '</p></div>' +
      '<div class="price">£' + parseFloat(item.price).toFixed(2) + '</div>' +
      '<div class="actions">' +
      (item.sold ? '' : '<button class="sold-btn" onclick="markSold(' + item.id + ')">Mark Sold</button>') +
      '<button class="del-btn" onclick="deleteItem(' + item.id + ')">Delete</button>' +
      '</div></div>'
    ).join("");
  } catch (e) {
    list.innerHTML = '<p style="color:var(--red);padding:24px;text-align:center">Error loading items: ' + e.message + '</p>';
  }
}

async function markSold(id) {
  if (!confirm("Mark this item as sold?")) return;
  await sb.from("items").update({ sold: true }).eq("id", id);
  loadItems();
}

async function deleteItem(id) {
  if (!confirm("Delete this item permanently?")) return;
  await sb.from("items").delete().eq("id", id);
  loadItems();
}

function showStatus(msg, type) {
  var el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status-msg " + type;
  setTimeout(() => { el.className = "status-msg"; }, 4000);
}

function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
</script>
</body>
</html>
