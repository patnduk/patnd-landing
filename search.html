<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — PATND</title>
<meta name="description" content="Search eBay, Vinted, Depop & Amazon at once. Find the cheapest price.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%237C3AED'/><text x='50' y='72' text-anchor='middle' font-size='64' font-weight='900' fill='%23FBBF24' font-family='Arial Black'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Lilita+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a10;--card:#111118;--border:#222233;--purple:#A855F7;--turq:#22D3EE;--yellow:#FBBF24;--pink:#FF6B9D;--orange:#FF7A33;--text:#f0f0f0;--dim:#888;--ebay:#e53238;--vinted:#09b1ba;--depop:#ff2300;--amazon:#FF9900;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* Yellow top bar */
.top-bar{background:var(--yellow);padding:16px 20px;position:sticky;top:0;z-index:10;}
.top-bar::after{content:'';position:absolute;bottom:-20px;left:0;width:100%;height:20px;background:linear-gradient(to bottom,rgba(251,191,36,0.15),transparent);pointer-events:none;}
.top-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.logo{display:inline-flex;background:#111;border-radius:10px;padding:5px 12px;font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:2px;text-decoration:none;border:2px solid #000;box-shadow:3px 3px 0 rgba(0,0,0,0.3);flex-shrink:0;}
.logo .lp,.logo .la{color:#A855F7;}.logo .lt{color:#22D3EE;}.logo .ln,.logo .ld{color:#FBBF24;}
.search-box{flex:1;display:flex;gap:6px;}
.search-box input{flex:1;padding:10px 14px;border-radius:8px;background:#fff;border:2px solid #111;color:#111;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;box-shadow:2px 2px 0 rgba(0,0,0,0.15);}
.search-box input::placeholder{color:#999;}
.search-box button{padding:10px 20px;border-radius:8px;background:var(--purple);border:2px solid #000;color:#fff;font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:1px;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,0.3);transition:all 0.15s;white-space:nowrap;}
.search-box button:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 rgba(0,0,0,0.3);}
.search-box button:disabled{opacity:0.5;transform:none;}

/* Filter pills */
.filters{max-width:640px;margin:0 auto;padding:14px 20px 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;overflow-x:auto;}
.pill{padding:5px 12px;border-radius:6px;background:var(--card);border:2px solid var(--border);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.pill.on{border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,0.08);}
.pill.on.ebay{border-color:var(--ebay);color:var(--ebay);background:rgba(229,50,56,0.08);}
.pill.on.vinted{border-color:var(--vinted);color:var(--vinted);background:rgba(9,177,186,0.08);}
.pill.on.depop{border-color:var(--depop);color:var(--depop);background:rgba(255,35,0,0.08);}
.pill.on.amazon{border-color:var(--amazon);color:var(--amazon);background:rgba(255,153,0,0.08);}
.sort-sel{padding:5px 8px;border-radius:6px;background:var(--card);border:2px solid var(--border);color:var(--dim);font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;margin-left:auto;outline:none;cursor:pointer;}

/* Status bar */
.status{max-width:640px;margin:0 auto;padding:8px 20px;font-size:12px;color:var(--dim);display:none;justify-content:space-between;}
.status .count{color:var(--yellow);font-weight:800;}
.status .time{color:var(--purple);}

/* Results */
.results-wrap{max-width:640px;margin:0 auto;padding:0 12px 80px;}
.result{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;padding:12px 10px;border-bottom:2px solid var(--border);cursor:pointer;text-decoration:none;color:inherit;transition:background 0.1s;-webkit-tap-highlight-color:transparent;}
.result:active{background:rgba(251,191,36,0.06);}
.result.best{background:rgba(251,191,36,0.06);border-left:3px solid var(--yellow);}
.result-img{width:56px;height:56px;border-radius:10px;background:#1a1828;object-fit:cover;border:2px solid var(--border);}
.result-img-ph{width:56px;height:56px;border-radius:10px;background:#1a1828;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:#555;}
.result-info{overflow:hidden;}
.result-info h4{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.result-meta{font-size:10px;color:var(--dim);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:800;}
.badge.ebay{background:rgba(229,50,56,0.12);color:var(--ebay);}
.badge.vinted{background:rgba(9,177,186,0.12);color:var(--vinted);}
.badge.depop{background:rgba(255,35,0,0.12);color:var(--depop);}
.badge.amazon{background:rgba(255,153,0,0.12);color:var(--amazon);}
.result-price{text-align:right;min-width:72px;}
.result-price .total{font-size:16px;font-weight:900;}
.result-price .total.best-p{color:var(--yellow);}
.result-price .bd{font-size:9px;color:var(--dim);}
.result-price .saving{font-size:9px;color:var(--orange);background:rgba(255,122,51,0.1);padding:1px 6px;border-radius:3px;display:inline-block;margin-top:2px;}
.best-tag{font-size:9px;background:rgba(251,191,36,0.15);color:var(--yellow);padding:2px 7px;border-radius:3px;font-weight:800;display:inline-block;margin-top:2px;}
.see-price{font-size:13px;font-weight:700;color:var(--purple);}

/* States */
.welcome,.loading,.empty{text-align:center;padding:60px 24px;color:var(--dim);}
.welcome h2{font-family:'Lilita One',cursive;font-size:1.5rem;color:var(--yellow);margin-bottom:8px;}
.welcome p{font-size:14px;line-height:1.6;}
.welcome .tagline{font-family:'Bangers',cursive;color:var(--purple);font-size:13px;margin-top:12px;letter-spacing:2px;}
.welcome .platforms-list{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap;}
.loading .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:14px;}
.loading .searching-platforms{display:flex;justify-content:center;gap:8px;margin-top:10px;}
.empty h3{font-family:'Bangers',cursive;color:var(--text);font-size:16px;margin-bottom:6px;letter-spacing:1px;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:var(--card);border-top:2px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:10;}
.bottom-nav a{text-decoration:none;text-align:center;color:var(--dim);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;}
.bottom-nav a.active{color:var(--yellow);}
.bottom-nav a svg{width:20px;height:20px;}

@media(min-width:768px){
  .top-inner,.filters,.status,.results-wrap{max-width:720px;}
}
</style>
</head>
<body>

<div class="top-bar">
<div class="top-inner">
  <a href="/" class="logo"><span class="lp">P</span><span class="la">A</span><span class="lt">T</span><span class="ln">N</span><span class="ld">D</span></a>
  <div class="search-box">
    <input type="text" id="q" placeholder='Search e.g. "Nike Dunk Low"' autofocus>
    <button id="btn" onclick="doSearch()">GO</button>
  </div>
</div>
</div>

<div class="filters">
  <span class="pill on ebay" data-p="ebay" onclick="togglePill(this)">eBay</span>
  <span class="pill on vinted" data-p="vinted" onclick="togglePill(this)">Vinted</span>
  <span class="pill on depop" data-p="depop" onclick="togglePill(this)">Depop</span>
  <span class="pill on amazon" data-p="amazon" onclick="togglePill(this)">Amazon</span>
  <select class="sort-sel" id="sortBy" onchange="rerender()">
    <option value="price">Price ↑</option>
    <option value="price-desc">Price ↓</option>
    <option value="newest">Newest</option>
  </select>
</div>

<div class="status" id="status">
  <span>Found <span class="count" id="count">0</span> listings</span>
  <span class="time" id="time"></span>
</div>

<div id="content" class="results-wrap">
  <div class="welcome">
    <h2>SEARCH ALL UK MARKETPLACES</h2>
    <p>Type what you're looking for. We search eBay, Vinted, Depop & Amazon and show you the cheapest price.</p>
    <div class="tagline">SEARCH LESS. SAVE MORE.</div>
    <div class="platforms-list">
      <span class="badge ebay">eBay</span>
      <span class="badge vinted">Vinted</span>
      <span class="badge depop">Depop</span>
      <span class="badge amazon">Amazon</span>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="/search.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    Search
  </a>
  <a href="/shop.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Shop
  </a>
  <a href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
</div>

<script>
const API_URL = "https://api.patnd.com";
const activePlatforms = new Set(["ebay", "vinted", "depop", "amazon"]);
let lastResults = [];

document.getElementById("q").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch();
});

function togglePill(el) {
  const p = el.dataset.p;
  if (activePlatforms.has(p)) {
    if (activePlatforms.size <= 1) return;
    activePlatforms.delete(p);
    el.classList.remove("on");
  } else {
    activePlatforms.add(p);
    el.classList.add("on");
  }
}

async function doSearch() {
  const q = document.getElementById("q").value.trim();
  if (!q) return;

  const btn = document.getElementById("btn");
  const content = document.getElementById("content");
  const status = document.getElementById("status");

  btn.disabled = true;
  btn.textContent = "...";
  status.style.display = "none";

  const badges = [...activePlatforms].map(function(p) {
    return '<span class="badge ' + p + '">' + p + '</span>';
  }).join("");

  content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching 4 marketplaces...</p><div class="searching-platforms">' + badges + '</div></div>';

  try {
    const resp = await fetch(API_URL + "/api/search?q=" + encodeURIComponent(q));
    const data = await resp.json();

    btn.disabled = false;
    btn.textContent = "GO";

    if (!data.success) {
      content.innerHTML = '<div class="empty"><h3>SEARCH FAILED</h3><p>' + esc(data.error || "Unknown error") + '</p></div>';
      return;
    }

    lastResults = data.results || [];
    document.getElementById("time").textContent = data.time ? data.time + "s" : "";
    rerender();

  } catch (e) {
    btn.disabled = false;
    btn.textContent = "GO";
    content.innerHTML = '<div class="empty"><h3>CONNECTION ERROR</h3><p>Could not reach the search server. Try again in a moment.</p></div>';
  }
}

function rerender() {
  const content = document.getElementById("content");
  const status = document.getElementById("status");

  // Filter by active platforms
  let filtered = lastResults.filter(function(r) { return activePlatforms.has(r.platform); });

  // Sort
  const sortBy = document.getElementById("sortBy").value;
  if (sortBy === "price") {
    filtered.sort(function(a, b) {
      if (a.no_price && !b.no_price) return 1;
      if (!a.no_price && b.no_price) return -1;
      return a.total_price - b.total_price;
    });
  } else if (sortBy === "price-desc") {
    filtered.sort(function(a, b) {
      if (a.no_price && !b.no_price) return 1;
      if (!a.no_price && b.no_price) return -1;
      return b.total_price - a.total_price;
    });
  }

  // Recalc best price
  const priced = filtered.filter(function(r) { return !r.no_price && r.total_price > 0; });
  const bestPrice = priced.length > 0 ? priced[0].total_price : 0;
  for (let i = 0; i < filtered.length; i++) {
    if (filtered[i].no_price) {
      filtered[i].is_best = false;
      filtered[i].saving = 0;
    } else {
      filtered[i].is_best = filtered[i].total_price === bestPrice;
      filtered[i].saving = Math.round((filtered[i].total_price - bestPrice) * 100) / 100;
    }
  }

  // Platform counts
  const counts = {};
  filtered.forEach(function(r) { counts[r.platform] = (counts[r.platform] || 0) + 1; });

  document.getElementById("count").textContent = filtered.length;
  status.style.display = "flex";

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty"><h3>NO RESULTS</h3><p>Try different keywords or enable more platforms.</p></div>';
    return;
  }

  content.innerHTML = filtered.map(function(r) {
    const img = r.image_url
      ? '<img class="result-img" src="' + esc(r.image_url) + '" onerror="this.style.display=\'none\'" loading="lazy">'
      : '<div class="result-img-ph">IMG</div>';

    let priceHtml;
    if (r.no_price) {
      priceHtml = '<div class="see-price">See price</div><div class="bd">Tap to view</div>';
    } else {
      let bd = "£" + r.price.toFixed(2);
      if (r.shipping > 0) bd += " + £" + r.shipping.toFixed(2) + " ship";
      if (r.fees > 0) bd += " + £" + r.fees.toFixed(2) + " fees";

      priceHtml = '<div class="total ' + (r.is_best ? "best-p" : "") + '">£' + r.total_price.toFixed(2) + '</div>' +
        '<div class="bd">' + bd + '</div>';

      if (r.is_best) priceHtml += '<div class="best-tag">BEST PRICE</div>';
      else if (r.saving > 0) priceHtml += '<div class="saving">£' + r.saving.toFixed(2) + ' more</div>';
    }

    return '<a class="result ' + (r.is_best ? "best" : "") + '" href="' + esc(r.url) + '" target="_blank">' +
      img +
      '<div class="result-info"><h4>' + esc(r.title) + '</h4>' +
      '<div class="result-meta"><span class="badge ' + r.platform + '">' + r.platform + '</span>' +
      '<span>' + esc(r.condition || "") + '</span>' +
      (r.posted_at ? '<span>' + esc(r.posted_at) + '</span>' : '') +
      '</div></div>' +
      '<div class="result-price">' + priceHtml + '</div></a>';
  }).join("");
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}
</script>
</body>
</html>
