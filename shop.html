<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Patnd</title>
<meta name="description" content="Shop clothes, jewelry and bags on Patnd.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%237C3AED'/><text x='50' y='72' text-anchor='middle' font-size='64' font-weight='900' fill='%23FBBF24' font-family='Arial Black'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--card:#13111e;--border:#1c1a2e;--text:#e4e4e7;--dim:#71717a;
    --yellow:#FBBF24;--purple:#A78BFA;--purple-deep:#7C3AED;--turquoise:#2DD4BF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .container{max-width:1100px;margin:0 auto;padding:0 24px;}
  nav{padding:24px 0;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-family:'Arial Black',Impact,sans-serif;font-size:1.3rem;font-weight:900;color:var(--yellow);letter-spacing:-1px;text-decoration:none;}
  .nav-links{display:flex;gap:20px;align-items:center;}
  .nav-links a{color:var(--dim);text-decoration:none;font-size:0.9rem;transition:color 0.2s;}
  .nav-links a:hover{color:var(--yellow);}
  .shop-header{text-align:center;padding:40px 0 32px;}
  .shop-header h1{font-size:2rem;font-weight:700;letter-spacing:-1px;margin-bottom:8px;}
  .shop-header h1 span{color:var(--yellow);}
  .shop-header p{color:var(--dim);font-size:1rem;}
  .filters{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
  .filter-btn{padding:8px 18px;border-radius:100px;background:var(--card);border:1px solid var(--border);color:var(--dim);font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .filter-btn:hover{border-color:var(--purple);color:var(--text);}
  .filter-btn.active{background:var(--purple-deep);border-color:var(--purple-deep);color:#fff;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding-bottom:80px;}
  .item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.2s,transform 0.2s;cursor:pointer;}
  .item-card:hover{border-color:rgba(167,139,250,0.3);transform:translateY(-2px);}
  .item-img{width:100%;aspect-ratio:1;object-fit:cover;background:#1a1828;display:block;}
  .item-img-placeholder{width:100%;aspect-ratio:1;background:#1a1828;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--dim);}
  .item-body{padding:16px;}
  .item-body h3{font-size:1rem;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-meta{font-size:0.8rem;color:var(--dim);margin-bottom:10px;display:flex;gap:8px;align-items:center;}
  .cat-tag{font-size:0.7rem;padding:2px 8px;border-radius:100px;font-weight:600;text-transform:uppercase;}
  .cat-tag.clothes{background:rgba(167,139,250,0.12);color:var(--purple);}
  .cat-tag.jewelry{background:rgba(251,191,36,0.12);color:var(--yellow);}
  .cat-tag.bags{background:rgba(45,212,191,0.12);color:var(--turquoise);}
  .item-bottom{display:flex;justify-content:space-between;align-items:center;}
  .item-price{font-size:1.2rem;font-weight:700;color:var(--yellow);}
  .buy-btn{padding:8px 16px;border-radius:8px;background:var(--yellow);border:none;color:var(--bg);font-weight:700;font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;}
  .buy-btn:hover{opacity:0.85;}
  .empty-state{text-align:center;padding:80px 24px;color:var(--dim);}
  .empty-state h2{color:var(--text);margin-bottom:8px;}
  .loading{text-align:center;padding:80px;color:var(--dim);}
  .loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:24px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px 16px 0 0;}
  .modal-body{padding:24px;}
  .modal-body h2{font-size:1.3rem;margin-bottom:8px;}
  .modal-body .desc{color:var(--dim);font-size:0.9rem;line-height:1.6;margin-bottom:16px;}
  .modal-body .details{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;font-size:0.85rem;color:var(--dim);}
  .modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  footer{padding:32px 0;border-top:1px solid var(--border);text-align:center;font-size:0.78rem;color:var(--dim);}
  @media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;}.item-body{padding:12px;}.item-body h3{font-size:0.88rem;}}
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/" class="logo">PATND</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/shop.html" style="color:var(--yellow)">Shop</a>
    </div>
  </nav>

  <div class="shop-header">
    <h1>The <span>Patnd</span> Shop</h1>
    <p>Clothes, jewelry & bags — curated picks, great prices.</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="clothes">Clothes</button>
    <button class="filter-btn" data-cat="jewelry">Jewelry</button>
    <button class="filter-btn" data-cat="bags">Bags</button>
  </div>

  <div id="items" class="grid">
    <div class="loading"><div class="spinner"></div><p>Loading items...</p></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative;">
    <button class="modal-close" id="modalClose">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <div class="details">
        <span id="modalCat" class="cat-tag"></span>
        <span id="modalSize"></span>
        <span id="modalCondition"></span>
      </div>
      <p class="desc" id="modalDesc"></p>
      <div class="item-bottom">
        <span class="item-price" id="modalPrice"></span>
        <a class="buy-btn" id="modalBuy" href="#" target="_blank">Message to Buy</a>
      </div>
    </div>
  </div>
</div>

<footer><div class="container">Patnd — Search less. Save more.</div></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// *** REPLACE THESE WITH YOUR SUPABASE CREDENTIALS ***
const SUPABASE_URL = "https://qgsajxzxggdzqytfkgwr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ihQidin7MM6H725tBzVa1g_L4mloekV";
const PAYPAL_LINK = "mailto:bloomsburyfire@gmail.com?subject=Patnd%20Shop%20Order";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let allItems = [];
let currentFilter = "all";

async function loadItems() {
  const container = document.getElementById("items");
  try {
    const { data, error } = await supabase
      .from("items")
      .select("*")
      .eq("sold", false)
      .order("created_at", { ascending: false });

    if (error) throw error;
    allItems = data || [];
    renderItems();
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><h2>Shop coming soon</h2><p>Check back shortly for new items.</p></div>';
    console.error("Load error:", e);
  }
}

function renderItems() {
  const container = document.getElementById("items");
  const filtered = currentFilter === "all" ? allItems : allItems.filter(i => i.category === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><h2>No items yet</h2><p>Check back soon — new items added regularly.</p></div>';
    return;
  }

  container.innerHTML = filtered.map(item => {
    const img = item.image_url
      ? '<img class="item-img" src="' + item.image_url + '" alt="' + esc(item.title) + '" loading="lazy">'
      : '<div class="item-img-placeholder">📦</div>';

    return '<div class="item-card" data-id="' + item.id + '">' +
      img +
      '<div class="item-body">' +
      '<h3>' + esc(item.title) + '</h3>' +
      '<div class="item-meta">' +
      '<span class="cat-tag ' + item.category + '">' + item.category + '</span>' +
      (item.size ? '<span>Size ' + esc(item.size) + '</span>' : '') +
      '</div>' +
      '<div class="item-bottom">' +
      '<span class="item-price">£' + parseFloat(item.price).toFixed(2) + '</span>' +
      '<a class="buy-btn" href="mailto:bloomsburyfire@gmail.com?subject=Patnd Shop - ' + encodeURIComponent(item.title) + '" target="_blank" onclick="event.stopPropagation()">Buy</a>' +
      '</div></div></div>';
  }).join("");

  container.querySelectorAll(".item-card").forEach(card => {
    card.addEventListener("click", () => openModal(card.dataset.id));
  });
}

function openModal(id) {
  const item = allItems.find(i => String(i.id) === String(id));
  if (!item) return;
  document.getElementById("modalImg").src = item.image_url || "";
  document.getElementById("modalTitle").textContent = item.title;
  document.getElementById("modalDesc").textContent = item.description || "No description.";
  document.getElementById("modalPrice").textContent = "£" + parseFloat(item.price).toFixed(2);
  document.getElementById("modalSize").textContent = item.size ? "Size " + item.size : "";
  document.getElementById("modalCondition").textContent = item.condition || "Pre-owned";
  var catEl = document.getElementById("modalCat");
  catEl.textContent = item.category;
  catEl.className = "cat-tag " + item.category;
  document.getElementById("modalBuy").href = "mailto:bloomsburyfire@gmail.com?subject=Patnd Shop - " + encodeURIComponent(item.title) + " (£" + parseFloat(item.price).toFixed(2) + ")";
  document.getElementById("modal").classList.add("open");
}

document.getElementById("modalClose").addEventListener("click", () => {
  document.getElementById("modal").classList.remove("open");
});
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal")) document.getElementById("modal").classList.remove("open");
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.cat;
    renderItems();
  });
});

function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

loadItems();
</script>
</body>
</html>
